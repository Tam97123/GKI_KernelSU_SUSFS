<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GKI Kernel Versions - Android Generic Kernel Image version tracking dashboard with KernelSU and SUSFS support information">
  <meta name="keywords" content="GKI, Android, Kernel, KernelSU, SUSFS, Linux, Security Patch">
  <meta name="author" content="zzh20188">
  <title>GKI Kernel Versions</title>

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://zzh20188.goatcounter.com">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Analytics -->
  <script
    data-goatcounter="https://zzh20188.goatcounter.com/count"
    async
    src="//gc.zgo.at/count.js"></script>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <h1 id="headerTitle">GKI Kernel Versions</h1>
        <p id="headerSubtitle">Android Generic Kernel Image — version tracking dashboard</p>
      </div>
      <div class="header-actions">
        <div class="search-toggle-wrap">
          <button class="search-toggle" id="searchToggle" title="Search (Ctrl+K)" aria-label="Search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </button>
          <input type="text" class="search-input" id="searchInput" style="display:none;" aria-label="Search input">
        </div>
        <a class="guide-link" id="guideLink" href="guide.html" title="Build Guide">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          <span id="guideLabel">Guide</span>
        </a>
        <button class="lang-toggle" id="langToggle" title="Switch language" aria-label="Switch language">
          <span id="langLabel">EN</span>
        </button>
        <button class="theme-toggle" id="themeToggle" title="Toggle theme (cycles Light → Dark → System)" aria-label="Toggle theme">
          <span id="themeIcon" aria-hidden="true">☽</span>
          <span id="themeLabel">Light</span>
        </button>
        <a class="github-link" href="https://github.com/zzh20188/GKI_KernelSU_SUSFS" target="_blank" rel="noopener noreferrer" title="View on GitHub">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
          <span>GitHub</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Tabs -->
  <nav class="tabs-container" role="navigation" aria-label="Kernel version tabs">
    <div class="tabs" id="tabs" role="tablist"></div>
  </nav>

  <!-- Announcement Modal -->
  <div class="modal-overlay announce-overlay" id="announceModal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="announceModalTitle">
    <div class="modal-card announce-card">
      <div class="modal-header">
        <span class="modal-title" id="announceModalTitle">Announcement</span>
        <button class="modal-close" id="announceModalClose" aria-label="Close announcement">&times;</button>
      </div>
      <div class="modal-body announce-body" id="announceModalBody"></div>
      <div class="announce-actions">
        <button class="announce-btn announce-btn-dismiss" id="announceDismissToday">Don't show today</button>
        <button class="announce-btn announce-btn-close" id="announceClose">Close</button>
      </div>
    </div>
  </div>

  <!-- Time Converter -->
  <section class="tools-section" aria-label="Time converter tool">
    <details class="tools-inner" id="tcDetails">
      <summary class="tools-summary" id="tcTitle">Time Converter</summary>
      <div class="tc-row">
        <div class="tc-inputs">
          <div class="tc-field">
            <label class="tc-label" id="tcDateLabel" for="tcDate">Date</label>
            <input type="date" class="tc-input" id="tcDate" aria-label="Date input">
          </div>
          <div class="tc-field">
            <label class="tc-label" id="tcTimeLabel" for="tcTime">Time (UTC)</label>
            <input type="time" class="tc-input" id="tcTime" step="1" aria-label="Time input">
          </div>
        </div>
        <div class="tc-result-box">
          <span class="tc-result" id="tcResult" aria-live="polite">—</span>
          <button class="tc-copy" id="tcCopy">Copy</button>
        </div>
      </div>
    </details>
  </section>

  <!-- Main Content -->
  <main class="main" id="content" role="main">
    <div class="loading" aria-live="polite" aria-busy="true">
      <div class="loading-spinner" aria-hidden="true"></div>
      <p id="loadingText">Loading kernel data…</p>
    </div>
  </main>

  <!-- Toast Notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Footer -->
  <footer class="footer" role="contentinfo">
    <span id="footerPre">Data sourced from</span>
    <a href="https://android.googlesource.com/kernel/common" target="_blank" rel="noopener noreferrer">android.googlesource.com</a>
    <span id="footerPost">. Updated automatically via GitHub Actions.</span>
  </footer>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">GitHub Action Parameters</span>
        <button class="modal-close" id="modalClose" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- Back to Top Button -->
  <button class="back-to-top" id="backToTop" title="Back to top" aria-label="Back to top">↑</button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
