name: Kernel Build - Android 12 (5.10)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU Variant"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - SukiSU
          - ReSukiSU
        default: ReSukiSU
      kernelsu_branch:
        description: "KSU Branch"
        required: true
        type: choice
        options:
          - Stable(Standard)
          - Dev(Development)
          - Other(Other/Specify)
        default: Stable(Standard)
      version:
        description: "Custom version name (Optional)"
        required: false
        type: string
      build_time:
        description: "Custom build time (Optional, N or blank = current UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_kpm:
        description: "KPM Feature (patched not supported yet)"
        required: true
        type: choice
        default: "disabled (Off)"
        options:
          - "disabled (Off)"
          - "enabled (On)"
          - "patched (Enabled and patched, not supported yet)"
      droidspaces:
        description: "Droidspaces container support"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      use_zram:
        description: "Enable ZRAM enhancement algorithm"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "Enable BBG anti-brick"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "Enable Re-Kernel driver"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "Disable SUSFS"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: string
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      called_from_main:
        description: "Whether called from main.yml (internal use)"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a12-5-10:
    name: "5.10.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "66"
            os_patch_level: "2022-01"
            revision: "r11"
          - sub_level: "81"
            os_patch_level: "2022-03"
            revision: "r11"
          - sub_level: "101"
            os_patch_level: "2022-04"
            revision: "r28"
          - sub_level: "110"
            os_patch_level: "2022-07"
            revision: "r1"
          - sub_level: "117"
            os_patch_level: "2022-09"
            revision: "r1"
          - sub_level: "136"
            os_patch_level: "2022-11"
            revision: "r15"
          - sub_level: "149"
            os_patch_level: "2023-01"
            revision: "r1"
          - sub_level: "160"
            os_patch_level: "2023-03"
            revision: "r1"
          - sub_level: "168"
            os_patch_level: "2023-04"
            revision: "r9"
          - sub_level: "177"
            os_patch_level: "2023-07"
            revision: "r3"
          - sub_level: "185"
            os_patch_level: "2023-09"
            revision: "r1"
          - sub_level: "198"
            os_patch_level: "2024-01"
            revision: "r17"
          - sub_level: "205"
            os_patch_level: "2024-03"
            revision: "r1"
          - sub_level: "209"
            os_patch_level: "2024-05"
            revision: "r13"
          - sub_level: "218"
            os_patch_level: "2024-08"
            revision: "r14"
          - sub_level: "226"
            os_patch_level: "2024-11"
            revision: "r8"
          - sub_level: "233"
            os_patch_level: "2025-02"
            revision: "r1"
          - sub_level: "236"
            os_patch_level: "2025-05"
            revision: "r1"
          - sub_level: "237"
            os_patch_level: "2025-06"
            revision: "r1"
          - sub_level: "240"
            os_patch_level: "2025-09"
            revision: "r1"
          - sub_level: "246"
            os_patch_level: "2025-12"
            revision: "r1"
          - sub_level: "X"
            os_patch_level: "lts"
            revision: "r1"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android12"
      kernel_version: "5.10"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      revision: ${{ matrix.revision }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}

  # Only run when triggered directly, skip when called from main.yml
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
