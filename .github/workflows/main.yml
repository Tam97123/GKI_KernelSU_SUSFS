# ========================================
# GKI Kernel Build Main Entry
# ========================================
# This workflow is the unified entry point for the project, used to:
# 1. Build all versions of the GKI kernel
# 2. Fetch the latest KSU manager
# 3. Collect patch conflict files for debugging
# 4. Create a GitHub Release (optional)
# ========================================

name: Build Kernel

# Concurrency control: Only run one instance per branch, new runs will cancel old ones
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      # ==================== Release Configuration ====================
      release_type:
        description: "Release Type"
        type: choice
        options:
          - Actions
          - Pre-Release
          - Release
        default: Actions

      # ==================== KernelSU Configuration ====================
      kernelsu_variant:
        description: "KernelSU Variant"
        type: choice
        options:
          - Suki
          - ReSuki
          - Official
          - Next
        default: ReSuki
      kernelsu_branch:
        description: "KSU Branch"
        type: choice
        options:
          - Stable(Standard)
          - Dev(Development)
        default: Stable(Standard)

      # ==================== Optional Configuration ====================
      version:
        description: "Custom version name (Optional)"
        type: string
        default: ""
        required: false
      build_time:
        description: "Custom build time (Optional, N or blank = current UTC)"
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
        required: false
      # ==================== Option Configuration ====================
      use_kpm:
        description: "KPM Feature (patched supported )"
        type: choice
        default: "disabled (Off)"
        options:
          - "disabled (Off)"
          - "enabled (On)"
          - "patched (Enabled and patched"
      droidspaces:
        description: "Droidspaces container support (5.10~6.6: slot patch, 6.12: on/off)"
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"

      # ==================== Feature Toggles ====================
      use_zram:
        description: "Enable ZRAM enhancement algorithm"
        type: boolean
        default: false
      use_bbg:
        description: "Enable BBG anti-brick"
        type: boolean
        default: false
      use_rekernel:
        description: "Enable Re-Kernel driver"
        type: boolean
        default: false
      cancel_susfs:
        description: "Disable SUSFS"
        type: boolean
        default: false

      # ==================== Build Version Selection ====================
      build_a12_5_10:
        description: "Android 12 - 5.10"
        type: boolean
        default: false
      build_a13_5_15:
        description: "Android 13 - 5.15"
        type: boolean
        default: false
      build_a14_6_1:
        description: "Android 14 - 6.1"
        type: boolean
        default: false
      build_a15_6_6:
        description: "Android 15 - 6.6"
        type: boolean
        default: false
      build_a16_6_12:
        description: "Android 16 - 6.12"
        type: boolean
        default: false
      build_all:
        description: "Build all versions"
        type: boolean
        default: true

jobs:
  # ==================== Get Manager ====================
  # Download the latest KernelSU manager APK and SUSFS module
  get-manager:
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}

  # ==================== Android 12 - 5.10 Build ====================
  build-a12-5-10:
    if: inputs.build_a12_5_10 || inputs.build_all
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      called_from_main: true

  # ==================== Android 13 - 5.15 Build ====================
  build-a13-5-15:
    if: inputs.build_a13_5_15 || inputs.build_all
    uses: ./.github/workflows/kernel-a13-5-15.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      called_from_main: true

  # ==================== Android 14 - 6.1 Build ====================
  build-a14-6-1:
    if: inputs.build_a14_6_1 || inputs.build_all
    uses: ./.github/workflows/kernel-a14-6-1.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      called_from_main: true

  # ==================== Android 15 - 6.6 Build ====================
  build-a15-6-6:
    if: inputs.build_a15_6_6 || inputs.build_all
    uses: ./.github/workflows/kernel-a15-6-6.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      called_from_main: true

  # ==================== Android 16 - 6.12 Build ====================
  build-a16-6-12:
    if: inputs.build_a16_6_12 || inputs.build_all
    uses: ./.github/workflows/kernel-a16-6-12.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel }}
      cancel_susfs: ${{ inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces }}
      called_from_main: true

  # ==================== Collect Patch Conflict Files ====================
  # Aggregate .rej files from all build tasks for easier debugging of patch issues
  collect-rejects:
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    needs:
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
      - build-a15-6-6
      - build-a16-6-12
    steps:
      - name: Download conflict files
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts
          pattern: '*-Rejects'

      - name: Process conflict files
        run: |
          mkdir -p aio-rejects
          for dir in ./downloaded-artifacts/*-Rejects; do
            [ -d "$dir" ] || continue
            dirname=$(basename "$dir")
            original_name=${dirname%-Rejects}
            mkdir -p "aio-rejects/$original_name"
            cp -r "$dir/." "aio-rejects/$original_name/"
          done
          if [ "$(ls -A aio-rejects 2>/dev/null)" ]; then
            cd aio-rejects && zip -r -q -9 ../AIO-REJ.zip . && cd ..
          fi

      - name: Upload aggregated conflict files
        uses: actions/upload-artifact@v6
        with:
          name: AIO-REJ
          path: AIO-REJ.zip
          if-no-files-found: ignore

  # ==================== Create Release ====================
  # When release_type is not Actions, create a GitHub Release
  # Restricted to the original repository, forks will skip this step
  release:
    if: ${{ always() && !cancelled() && inputs.release_type != 'Actions' && github.repository == 'zzh20188/GKI_KernelSU_SUSFS' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    needs:
      - get-manager
      - build-a12-5-10
      - build-a13-5-15
      - build-a14-6-1
      - build-a15-6-6
      - build-a16-6-12

    # ==================== Environment Variables ====================
    env:
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      # ==================== Set Display Names ====================
      # Pre-calculate various display names to simplify future references
      - name: Set Display Names
        run: |
          # KSU Display Name
          case "${{ inputs.kernelsu_variant }}" in
            "Next")      KSU_NAME="KernelSU-Next" ;;
            "Official")  KSU_NAME="KernelSU" ;;
            "Suki")      KSU_NAME="Suki" ;;
            "ReSuki")    KSU_NAME="ReSuki" ;;
          esac
          echo "KSU_NAME=$KSU_NAME" >> $GITHUB_ENV

          # Version info
          KSU_VER="${{ needs.get-manager.outputs.ksuVer }}"
          SUS_VER="${{ needs.get-manager.outputs.susVer }}"
          echo "KSU_VER=$KSU_VER" >> $GITHUB_ENV
          echo "SUS_VER=$SUS_VER" >> $GITHUB_ENV

          # Feature toggles display
          echo "LZ4_STATUS=${{ inputs.use_zram && 'Enabled' || 'Not Enabled' }}" >> $GITHUB_ENV
          echo "BBG_STATUS=${{ inputs.use_bbg && 'Supported' || 'Not Supported' }}" >> $GITHUB_ENV
          if [[ "${{ inputs.use_kpm }}" == enabled* ]]; then
            echo "KPM_STATUS=Supported" >> $GITHUB_ENV
          elif [[ "${{ inputs.use_kpm }}" == patched* ]]; then
            echo "KPM_STATUS=Supported (Patch not supported yet)" >> $GITHUB_ENV
          else
            echo "KPM_STATUS=Not Enabled" >> $GITHUB_ENV
          fi

          # Hook type
          if [ "${{ inputs.kernelsu_variant }}" = "Suki" ] || [ "${{ inputs.kernelsu_variant }}" = "ReSuki" ]; then
            echo "HOOK_TYPE=SUSFS Inline Hooks" >> $GITHUB_ENV
          else
            echo "HOOK_TYPE=KPROBE Hooks" >> $GITHUB_ENV
          fi

          # Mount type
          if [ "${{ inputs.kernelsu_variant }}" = "Official" ]; then
            echo "MOUNT_TYPE=OVERLAYFS" >> $GITHUB_ENV
          else
            echo "MOUNT_TYPE=Magic Mount" >> $GITHUB_ENV
          fi

          # Branch display
          if [ "${{ inputs.kernelsu_branch }}" = "Dev(Development)" ]; then
            echo "BRANCH_INFO=Dev" >> $GITHUB_ENV
          else
            echo "BRANCH_INFO=Stable" >> $GITHUB_ENV
          fi

          # Release title
          echo "RELEASE_NAME=GKI Kernel: ${KSU_NAME} ${KSU_VER} + SUSFS ${SUS_VER}" >> $GITHUB_ENV

      # ==================== Verify Build Status ====================
      # Ensure all selected build tasks completed successfully
      - name: Verify Build Status
        run: |
          failed=0
          check_build() {
            local selected="$1" job_name="$2" result="$3"
            if [[ "$selected" == "true" && "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Selected build task $job_name failed (Result: $result)"
              failed=1
            fi
          }
          check_build "${{ inputs.build_a12_5_10 || inputs.build_all }}" "build-a12-5-10" "${{ needs.build-a12-5-10.result }}"
          check_build "${{ inputs.build_a13_5_15 || inputs.build_all }}" "build-a13-5-15" "${{ needs.build-a13-5-15.result }}"
          check_build "${{ inputs.build_a14_6_1 || inputs.build_all }}" "build-a14-6-1" "${{ needs.build-a14-6-1.result }}"
          check_build "${{ inputs.build_a15_6_6 || inputs.build_all }}" "build-a15-6-6" "${{ needs.build-a15-6-6.result }}"
          check_build "${{ inputs.build_a16_6_12 || inputs.build_all }}" "build-a16-6-12" "${{ needs.build-a16-6-12.result }}"
          [[ "$failed" -ne 0 ]] && exit 1 || true

      # ==================== Checkout Code ====================
      - name: Checkout Code
        uses: actions/checkout@v6

      # ==================== Determine KSU Branch ====================
      # Determine actual Git branch based on user selection
      - name: Determine KSU Branch
        if: inputs.kernelsu_branch == 'Dev(Development)' || inputs.kernelsu_variant == 'Suki' || inputs.kernelsu_variant == 'ReSuki'
        run: |
          case "${{ inputs.kernelsu_variant }}" in
            "Official") BRANCH="main" ;;
            "Suki"|"ReSuki") BRANCH="main" ;;
            "Next") BRANCH="dev" ;;
            *) echo "Error: Unknown variant" >&2; exit 1 ;;
          esac
          echo "KSU_BRANCH=$BRANCH" >> $GITHUB_ENV

      # ==================== Get KernelSU Commit Info ====================
      # Get the Git commit info for the KernelSU version currently being used
      - name: Get KernelSU Commit Info
        run: |
          case "${{ inputs.kernelsu_variant }}" in
            "Official") REPO_URL="https://github.com/tiann/KernelSU.git"; REPO_URL2="tiann/KernelSU" ;;
            "Next") REPO_URL="https://github.com/KernelSU-Next/KernelSU-Next.git"; REPO_URL2="KernelSU-Next/KernelSU-Next" ;;
            "Suki") REPO_URL="https://github.com/SukiSU-Ultra/SukiSU-Ultra.git"; REPO_URL2="SukiSU-Ultra/SukiSU-Ultra" ;;
            "ReSuki") REPO_URL="https://github.com/ReSukiSU/ReSukiSU.git"; REPO_URL2="ReSukiSU/ReSukiSU" ;;
          esac

          if [[ "${{ inputs.kernelsu_branch }}" == "Stable(Standard)" ]]; then
            TAG=$(git ls-remote --tags --sort=-v:refname $REPO_URL | grep -o 'refs/tags/.*' | cut -d'/' -f3 | head -n1)
            KSU_REF=$TAG
            KSU_URL="https://github.com/$REPO_URL2/releases/tag/$TAG"
          else
            COMMIT_HASH=$(git ls-remote $REPO_URL refs/heads/${KSU_BRANCH:-main} | awk '{ print $1 }')
            KSU_REF=$COMMIT_HASH
            KSU_URL="https://github.com/$REPO_URL2/commit/$COMMIT_HASH"
          fi

          echo "KSU_REF=$KSU_REF" >> $GITHUB_ENV
          echo "KSU_URL=$KSU_URL" >> $GITHUB_ENV

      # ==================== Get SUSFS Commit Info ====================
      # Get the Git commit info for SUSFS across versions
      - name: Get SUSFS Commit Info
        run: |
          GITLAB_OWNER="simonpunk"
          GITLAB_REPO="susfs4ksu"
          declare -A BRANCH_MAP=(
            ["gki_android12_5_10"]="gki-android12-5.10"
            ["gki_android13_5_15"]="gki-android13-5.15"
            ["gki_android14_6_1"]="gki-android14-6.1"
            ["gki_android15_6_6"]="gki-android15-6.6"
            ["gki_android16_6_12"]="gki-android16-6.12"
          )
          for var_name in "${!BRANCH_MAP[@]}"; do
            branch_name="${BRANCH_MAP[$var_name]}"
            COMMIT_HASH=$(git ls-remote https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO.git refs/heads/$branch_name | awk '{ print $1 }')
            if [[ -n "$COMMIT_HASH" ]]; then
              COMMIT_URL="https://gitlab.com/$GITLAB_OWNER/$GITLAB_REPO/-/commit/$COMMIT_HASH"
              echo "COMMIT_HASH_${var_name}=$COMMIT_HASH" >> "$GITHUB_ENV"
              echo "COMMIT_URL_${var_name}=$COMMIT_URL" >> "$GITHUB_ENV"
            fi
          done

      # ==================== Generate Release Notes ====================
      # Create detailed release notes documentation
      - name: Generate Release Notes
        run: |
          BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          if [[ "$KSU_REF" =~ ^[0-9a-f]{40}$ ]]; then
            KSU_DISPLAY_REF="${KSU_REF:0:7}"
          else
            KSU_DISPLAY_REF="$KSU_REF"
          fi

          build_targets=""
          append_target() {
            local selected="$1" label="$2"
            if [[ "$selected" == "true" ]]; then
              if [[ -z "$build_targets" ]]; then
                build_targets="$label"
              else
                build_targets="$build_targets, $label"
              fi
            fi
          }
          append_target "${{ inputs.build_a12_5_10 || inputs.build_all }}" "Android 12 / 5.10"
          append_target "${{ inputs.build_a13_5_15 || inputs.build_all }}" "Android 13 / 5.15"
          append_target "${{ inputs.build_a14_6_1 || inputs.build_all }}" "Android 14 / 6.1"
          append_target "${{ inputs.build_a15_6_6 || inputs.build_all }}" "Android 15 / 6.6"
          append_target "${{ inputs.build_a16_6_12 || inputs.build_all }}" "Android 16 / 6.12"
          if [[ -z "$build_targets" ]]; then
            build_targets="None Selected"
          fi

          : > susfs_commits.md
          append_susfs_commit() {
            local selected="$1" label="$2" hash="$3" url="$4"
            if [[ "$selected" == "true" && -n "$hash" && -n "$url" ]]; then
              printf -- '- %s: [`%s`](%s)\n' "$label" "${hash:0:7}" "$url" >> susfs_commits.md
            fi
          }
          append_susfs_commit "${{ inputs.build_a12_5_10 || inputs.build_all }}" "Android 12 / 5.10" "${COMMIT_HASH_gki_android12_5_10}" "${COMMIT_URL_gki_android12_5_10}"
          append_susfs_commit "${{ inputs.build_a13_5_15 || inputs.build_all }}" "Android 13 / 5.15" "${COMMIT_HASH_gki_android13_5_15}" "${COMMIT_URL_gki_android13_5_15}"
          append_susfs_commit "${{ inputs.build_a14_6_1 || inputs.build_all }}" "Android 14 / 6.1" "${COMMIT_HASH_gki_android14_6_1}" "${COMMIT_URL_gki_android14_6_1}"
          append_susfs_commit "${{ inputs.build_a15_6_6 || inputs.build_all }}" "Android 15 / 6.6" "${COMMIT_HASH_gki_android15_6_6}" "${COMMIT_URL_gki_android15_6_6}"
          append_susfs_commit "${{ inputs.build_a16_6_12 || inputs.build_all }}" "Android 16 / 6.12" "${COMMIT_HASH_gki_android16_6_12}" "${COMMIT_URL_gki_android16_6_12}"
          if [[ ! -s susfs_commits.md ]]; then
            echo "- Failed to retrieve corresponding SUSFS commit information for this build" > susfs_commits.md
          fi

          cat > release_body.md << EOF
          ## GKI Kernel Release

          **$KSU_NAME $KSU_VER** + **SUSFS $SUS_VER**

          | Item | Detail |
          |:---|:---|
          | Release Type | ${{ inputs.release_type }} |
          | Release Time | $BUILD_DATE |
          | Build Targets | $build_targets |

          ### Build Configuration

          | Item | Detail |
          |:---|:---|
          | KernelSU Variant | $KSU_NAME |
          | KernelSU Branch | $BRANCH_INFO |
          | SUSFS | $SUS_VER |
          | Hook Type | $HOOK_TYPE |
          | Mount Type | $MOUNT_TYPE |
          | LTO | thin |
          | BBG Security Patch | $BBG_STATUS |
          | ZRAM / LZ4KD | $LZ4_STATUS |
          | KPM | $KPM_STATUS |

          ### Download Instructions

          Please download the corresponding files in the **Assets** below.

          | File Type | Purpose |
          |:---|:---|
          | \`*_kernel-*.zip\` | AnyKernel3 Kernel Flashable Zip |
          | \`*.img\` | boot, vendor_boot and other image files |
          | \`*.apk\` | KernelSU Manager |
          | \`susfs-*.zip\` | SUSFS Companion Module |

          > [!IMPORTANT]
          > Please backup your stock Boot image before flashing.
          > If the device fails to boot, restore the stock image first, then extract the KernelSU log to provide feedback.

          <details>
          <summary>Post-Flash Instructions</summary>

          ### Normal Boot

          After installing or updating the KernelSU manager, check if root, modules, and SUSFS status are functioning correctly.

          ### Boot Failure

          1. Restore stock Boot image
          2. Extract logs using KernelSU manager or recovery
          3. Submit to [Issues](https://github.com/zzh20188/GKI_KernelSU_SUSFS/issues), including device model, Android version, kernel version, and the flashed filename

          </details>

          <details>
          <summary>Upstream Commit Info</summary>

          **KernelSU**

          - $KSU_NAME: [\`$KSU_DISPLAY_REF\`]($KSU_URL)

          **SUSFS4KSU**

          $(cat susfs_commits.md)

          </details>

          ---

          Recommended Module: https://github.com/sidex15/ksu_module_susfs

          For Unicode zero-width bypass fix, please use Xposed module: https://t.me/real5ec1cff/268
          EOF

      # ==================== Generate Release Tag ====================
      # Generate an incremental release tag based on the SUSFS version
      - name: Generate Release Tag
        run: |
          # Get SUSFS version, if get-manager was skipped, use default value
          SUS_VERSION="${{ needs.get-manager.outputs.susVer }}"
          if [ -z "$SUS_VERSION" ]; then
            echo "Warning: SUSFS version not retrieved, using default version number"
            SUS_VERSION="1.0.0"
          fi

          LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name' 2>/dev/null | sed 's/-.*//' || echo "")

          if [ "$SUS_VERSION" = "$LATEST_TAG" ]; then
            LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
          else
            LATEST_TAG="$SUS_VERSION-r0"
          fi

          NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV

          git tag "$NEW_TAG"
          git push --tags

      # ==================== Download Build Artifacts ====================
      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ./downloaded-artifacts

      # ==================== Create GitHub Release ====================
      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          if [ "${{ inputs.release_type }}" == "Pre-Release" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$NEW_TAG" \
            --title "$RELEASE_NAME" \
            --notes-file release_body.md \
            $PRERELEASE_FLAG

      # ==================== Upload Manager and Modules ====================
      - name: Upload Manager and SUSFS Module
        continue-on-error: true
        run: |
          echo "Preparing to upload APK and SUSFS module..."
          apk_count=$(find ./downloaded-artifacts -type f -name "*.apk" | wc -l || true)
          sus_count=$(find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" | wc -l || true)
          echo "APK files: ${apk_count}"
          echo "SUSFS files: ${sus_count}"
          find ./downloaded-artifacts -type f -name "*.apk" -print0 | \
          while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done
          find ./downloaded-artifacts -type f -path "./downloaded-artifacts/susfs-*/*" -print0 | \
          while IFS= read -r -d '' f; do
            gh release upload "$NEW_TAG" "$f" || true
          done

      # ==================== Upload Kernel Artifacts ====================
      - name: Upload Kernel Artifacts
        run: |
          for file in ./downloaded-artifacts/*_kernel-*/*; do
            [ -d "$file" ] && continue
            # Skip files in the -Rejects directory (already processed collectively in collect-rejects)
            [[ "$file" == *-Rejects/* ]] && continue
            echo "Uploading $file..."
            gh release upload "$NEW_TAG" "$file"
          done

      # ==================== Build Summary ====================
      - name: Build Summary
        run: |
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: $NEW_TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Type**: ${{ inputs.release_type }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Link**: https://github.com/$REPO_OWNER/$REPO_NAME/releases/tag/$NEW_TAG" >> $GITHUB_STEP_SUMMARY
