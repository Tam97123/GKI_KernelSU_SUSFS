name: Kernel Build - Android 16 (6.12)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU Variant"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - SukiSU
          - ReSukiSU
        default: ReSukiSU
      kernelsu_branch:
        description: "KSU Branch"
        required: true
        type: choice
        options:
          - Stable(Standard)
          - Dev(Development)
          - Other(Other/Specify)
        default: Stable(Standard)
      version:
        description: "Custom version name (Optional)"
        required: false
        type: string
      build_time:
        description: "Custom build time (Optional, N or blank = current UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_kpm:
        description: "KPM Feature (patched not supported yet)"
        required: true
        type: choice
        default: "disabled (Off)"
        options:
          - "disabled (Off)"
          - "enabled (On)"
          - "patched (Enabled and patched, not supported yet)"
      droidspaces:
        description: "Droidspaces container support"
        required: false
        type: choice
        options:
          - "off"
          - "on"
        default: "off"
      use_zram:
        description: "Enable ZRAM enhancement algorithm"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "Enable BBG anti-brick"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "Enable Re-Kernel driver"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "Disable SUSFS"
        required: true
        type: boolean
        default: false
      supp_op:
        description: "Enable OnePlus 8E support"
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: string
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      supp_op:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      called_from_main:
        description: "Whether called from main.yml (internal use)"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a16-6-12:
    name: "6.12.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "23"
            os_patch_level: "2025-06"
          - sub_level: "30"
            os_patch_level: "2025-07"
          - sub_level: "38"
            os_patch_level: "2025-09"
          - sub_level: "58"
            os_patch_level: "2025-12"
          # - sub_level: "X"
          #   os_patch_level: "lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android16"
      kernel_version: "6.12"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: false
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: ${{ inputs.supp_op || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}

  # Only run when triggered directly, skip when called from main.yml
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
