name: Kernel Build - Android 14 (5.15)

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_variant:
        description: "KernelSU Variant"
        required: true
        type: choice
        options:
          - Official
          #- Next
          - SukiSU
          - ReSukiSU
        default: ReSukiSU
      kernelsu_branch:
        description: "KSU Branch"
        required: true
        type: choice
        options:
          - Stable(Standard)
          - Dev(Development)
          - Other(Other/Specify)
        default: Stable(Standard)
      version:
        description: "Custom version name (Optional)"
        required: false
        type: string
      build_time:
        description: "Custom build time (Optional, N or blank = current UTC)"
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_kpm:
        description: "KPM Feature (patched not supported yet)"
        required: true
        type: choice
        default: "disabled (Off)"
        options:
          - "disabled (Off)"
          - "enabled (On)"
          - "patched (Enabled and patched, not supported yet)"
      droidspaces:
        description: "Droidspaces container support"
        required: false
        type: choice
        options:
          - "off"
          - "678"
          - "123"
          - "345"
        default: "off"
      use_zram:
        description: "Enable ZRAM enhancement algorithm"
        required: true
        type: boolean
        default: false
      use_bbg:
        description: "Enable BBG anti-brick"
        required: true
        type: boolean
        default: false
      use_rekernel:
        description: "Enable Re-Kernel driver"
        required: false
        type: boolean
        default: false
      cancel_susfs:
        description: "Disable SUSFS"
        required: true
        type: boolean
        default: false
  workflow_call:
    inputs:
      kernelsu_variant:
        required: true
        type: string
      kernelsu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: string
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
      droidspaces:
        required: false
        type: string
        default: "off"
      called_from_main:
        description: "Whether called from main.yml (internal use)"
        required: false
        type: boolean
        default: false

jobs:
  build-kernels-a14-5-15:
    name: "5.15.${{ matrix.sub_level }}-${{ matrix.os_patch_level }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - sub_level: "110"
            os_patch_level: "2023-06"
          - sub_level: "110"
            os_patch_level: "2023-08"
          - sub_level: "110"
            os_patch_level: "2023-09"
          - sub_level: "131"
            os_patch_level: "2023-11"
          - sub_level: "137"
            os_patch_level: "2024-01"
          - sub_level: "144"
            os_patch_level: "2024-02"
          - sub_level: "144"
            os_patch_level: "2024-03"
          - sub_level: "148"
            os_patch_level: "2024-04"
          - sub_level: "148"
            os_patch_level: "2024-05"
          - sub_level: "149"
            os_patch_level: "2024-06"
          - sub_level: "153"
            os_patch_level: "2024-07"
          - sub_level: "158"
            os_patch_level: "2024-08"
          - sub_level: "164"
            os_patch_level: "2024-09"
          - sub_level: "167"
            os_patch_level: "2024-11"
          - sub_level: "170"
            os_patch_level: "2025-01"
          - sub_level: "178"
            os_patch_level: "2025-03"
          - sub_level: "180"
            os_patch_level: "2025-05"
          - sub_level: "185"
            os_patch_level: "2025-07"
          - sub_level: "192"
            os_patch_level: "2025-10"
          - sub_level: "196"
            os_patch_level: "2026-01"
          - sub_level: "202"
            os_patch_level: "2026-04"
          - sub_level: "X"
            os_patch_level: "lts"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android14"
      kernel_version: "5.15"
      sub_level: ${{ matrix.sub_level }}
      os_patch_level: ${{ matrix.os_patch_level }}
      ksu_variant: ${{ inputs.kernelsu_variant }}
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time || '' }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: ${{ inputs.use_kpm }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      supp_op: false
      enable_susfs: ${{ !inputs.cancel_susfs }}
      droidspaces: ${{ inputs.droidspaces || 'off' }}

  # Only run when triggered directly, skip when called from main.yml
  get-ksu-manager:
    if: ${{ !inputs.called_from_main }}
    uses: ./.github/workflows/get-manager.yml
    secrets: inherit
    with:
      kernelsu_variant: ${{ inputs.kernelsu_variant }}
